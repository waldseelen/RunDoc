# =============================================
# Pandoc Orchestrator — Docker Compose
# Lokal Geliştirme Ortamı
# =============================================

services:
  # Next.js Frontend & API
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - WORKER_API_URL=http://worker:8000
    volumes:
      - ../apps/web/src:/app/src
    depends_on:
      - worker
    networks:
      - orchestrator-net

  # Python FastAPI Worker
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - WORKER_TEMP_DIR=/tmp/pandoc-workdir
      - WORKER_MAX_TIMEOUT=120
    volumes:
      - ../apps/worker/app:/home/worker/app/app
      - worker-temp:/tmp/pandoc-workdir
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    networks:
      - orchestrator-net

volumes:
  worker-temp:
    driver: local

networks:
  orchestrator-net:
    driver: bridge
